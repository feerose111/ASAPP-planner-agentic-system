services:

  backend:
    container_name: planner_backend
    build:
      context: .
    env_file:
      - .env
    restart: on-failure
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - qdrant
      - redis
    networks:
      - planner_network

  postgres:
    image : postgres:16-alpine
    container_name: postgres_db
    restart: on-failure
    ports:
      - "5432:5432"
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - planner_network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: planner_qdrant
    restart: on-failure
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - planner_network

  redis:
    image: redis:7-alpine
    container_name: planner_redis
    restart: on-failure
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - planner_network


volumes:
  postgres_data:
  qdrant_data:
  redis_data:

networks:
  planner_network:








